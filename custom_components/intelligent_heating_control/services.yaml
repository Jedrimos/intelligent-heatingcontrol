add_room:
  name: Zimmer hinzufügen
  description: Fügt ein neues Zimmer zur Heizungssteuerung hinzu.
  fields:
    name:
      name: Zimmername
      description: Name des Zimmers (z.B. "Wohnzimmer")
      required: true
      example: "Wohnzimmer"
      selector:
        text:
    temp_sensor:
      name: Temperatursensor
      description: Entitäts-ID des Temperatursensors im Zimmer
      required: false
      example: "sensor.wohnzimmer_temperatur"
      selector:
        entity:
          domain: sensor
    valve_entity:
      name: Thermostat/Ventil
      description: Entitäts-ID des steuerbaren Thermostats oder Ventils (optional)
      required: false
      selector:
        entity:
          domain: climate
    window_sensor:
      name: Fenstersensor
      description: Binärsensor für Fenster-offen-Erkennung (optional)
      required: false
      selector:
        entity:
          domain: binary_sensor
    room_offset:
      name: Zimmer-Offset (°C)
      description: Offset zur Heizkurven-Basistemperatur für dieses Zimmer
      required: false
      default: 0.0
      selector:
        number:
          min: -5
          max: 5
          step: 0.5
          unit_of_measurement: "°C"
    comfort_temp:
      name: Komfort-Temperatur (°C)
      required: false
      default: 21.0
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
    eco_temp:
      name: Eco-Temperatur (°C)
      required: false
      default: 18.0
      selector:
        number:
          min: 10
          max: 25
          step: 0.5
    sleep_temp:
      name: Schlaf-Temperatur (°C)
      required: false
      default: 17.0
      selector:
        number:
          min: 10
          max: 25
          step: 0.5
    deadband:
      name: Totband (°C)
      description: Proportionalbereich für die Anforderungsberechnung
      required: false
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 2.0
          step: 0.1
    weight:
      name: Gewichtung
      description: Gewichtung dieses Zimmers bei der Gesamtanforderungsberechnung
      required: false
      default: 1.0
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1

remove_room:
  name: Zimmer entfernen
  description: Entfernt ein Zimmer aus der Heizungssteuerung.
  fields:
    id:
      name: Zimmer-ID
      description: Interne ID des zu entfernenden Zimmers
      required: true
      selector:
        text:

update_room:
  name: Zimmer aktualisieren
  description: Aktualisiert die Konfiguration eines bestehenden Zimmers.
  fields:
    id:
      name: Zimmer-ID
      description: Interne ID des Zimmers
      required: true
      selector:
        text:
    temp_sensor:
      name: Temperatursensor
      required: false
      selector:
        text:
    valve_entity:
      name: Thermostat/Ventil (primär)
      required: false
      selector:
        text:
    valve_entities:
      name: Thermostate/Ventile (Liste)
      required: false
      selector:
        object:
    window_sensor:
      name: Fenstersensor (primär)
      required: false
      selector:
        text:
    window_sensors:
      name: Fenstersensoren (Liste)
      required: false
      selector:
        object:
    comfort_temp:
      name: Komfort-Fallback (°C)
      required: false
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
    eco_offset:
      name: Eco-Abzug (°C)
      required: false
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
    eco_max_temp:
      name: Eco-Maximum (°C)
      required: false
      selector:
        number:
          min: 10
          max: 28
          step: 0.5
    sleep_offset:
      name: Schlaf-Abzug (°C)
      required: false
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
    sleep_max_temp:
      name: Schlaf-Maximum (°C)
      required: false
      selector:
        number:
          min: 10
          max: 25
          step: 0.5
    away_offset:
      name: Abwesend-Abzug (°C)
      required: false
      selector:
        number:
          min: 0
          max: 15
          step: 0.5
    away_max_temp:
      name: Abwesend-Maximum (°C)
      required: false
      selector:
        number:
          min: 5
          max: 22
          step: 0.5
    room_offset:
      name: Zimmer-Offset (°C)
      required: false
      selector:
        number:
          min: -5
          max: 5
          step: 0.5
    deadband:
      name: Totband (°C)
      required: false
      selector:
        number:
          min: 0.1
          max: 2.0
          step: 0.1
    weight:
      name: Gewichtung
      required: false
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
    ha_schedule_off_mode:
      name: Zeitplan-Aus-Modus
      required: false
      selector:
        text:
    ha_schedules:
      name: HA-Zeitpläne
      required: false
      selector:
        object:
    humidity_sensor:
      name: Feuchtigkeitssensor
      required: false
      selector:
        text:
    mold_protection_enabled:
      name: Schimmelschutz aktiviert
      required: false
      selector:
        boolean:
    co2_sensor:
      name: CO₂-Sensor
      required: false
      selector:
        text:
    radiator_kw:
      name: Heizleistung Zimmer (kW)
      required: false
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
    hkv_sensor:
      name: HKV-Sensor
      required: false
      selector:
        text:
    hkv_factor:
      name: HKV-Faktor (kWh/Einheit)
      required: false
      selector:
        number:
          min: 0.001
          max: 1.0
          step: 0.001
    room_presence_entities:
      name: Anwesenheits-Entitäten
      required: false
      selector:
        object:
    boost_temp:
      name: Boost-Temperatur (°C)
      required: false
      selector:
        number:
          min: 15
          max: 35
          step: 0.5
    boost_default_duration:
      name: Boost-Dauer (min)
      required: false
      selector:
        number:
          min: 5
          max: 480
          step: 5

set_room_mode:
  name: Zimmermodus setzen
  description: Setzt den Betriebsmodus für ein Zimmer.
  fields:
    id:
      name: Zimmer-ID
      required: true
      selector:
        text:
    mode:
      name: Modus
      description: "auto, comfort, eco, sleep, away, off, manual"
      required: true
      selector:
        select:
          options:
            - "auto"
            - "comfort"
            - "eco"
            - "sleep"
            - "away"
            - "off"
            - "manual"

set_system_mode:
  name: Systemmodus setzen
  description: Setzt den globalen Betriebsmodus der Heizungssteuerung.
  fields:
    mode:
      name: Modus
      description: "auto, heat, cool, off, away, vacation"
      required: true
      selector:
        select:
          options:
            - "auto"
            - "heat"
            - "cool"
            - "off"
            - "away"
            - "vacation"

boost_room:
  name: Zimmer boosten
  description: Aktiviert den Boost-Modus für ein Zimmer für eine bestimmte Dauer.
  fields:
    id:
      name: Zimmer-ID
      description: Interne ID des Zimmers
      required: true
      selector:
        text:
    duration_minutes:
      name: Dauer (Minuten)
      description: Wie lange der Boost aktiv sein soll
      required: false
      default: 60
      selector:
        number:
          min: 5
          max: 480
          step: 5
    cancel:
      name: Abbrechen
      description: Wenn true, wird der aktive Boost abgebrochen
      required: false
      default: false
      selector:
        boolean:

update_global_settings:
  name: Globale Einstellungen aktualisieren
  description: Aktualisiert globale Einstellungen der Heizungssteuerung ohne Neustart.
  fields:
    demand_threshold:
      name: Einschaltschwelle (%)
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
    demand_hysteresis:
      name: Hysterese (%)
      required: false
      selector:
        number:
          min: 1
          max: 30
          step: 1
    min_on_time:
      name: Min. Einschaltzeit (min)
      required: false
      selector:
        number:
          min: 1
          max: 60
          step: 1
    min_off_time:
      name: Min. Ausschaltzeit (min)
      required: false
      selector:
        number:
          min: 1
          max: 60
          step: 1
    min_rooms_demand:
      name: Min. Zimmer mit Anforderung
      required: false
      selector:
        number:
          min: 1
          max: 20
          step: 1
    away_temp:
      name: Abwesend-Temperatur (°C)
      required: false
      selector:
        number:
          min: 5
          max: 25
          step: 0.5
    vacation_temp:
      name: Urlaubs-Temperatur (°C)
      required: false
      selector:
        number:
          min: 5
          max: 20
          step: 0.5
    frost_protection_temp:
      name: Frostschutz-Temperatur (°C)
      required: false
      selector:
        number:
          min: 4
          max: 15
          step: 0.5
    summer_mode_enabled:
      name: Sommerautomatik aktivieren
      required: false
      selector:
        boolean:
    summer_threshold:
      name: Sommer-Schwelle (°C)
      required: false
      selector:
        number:
          min: 10
          max: 30
          step: 0.5
    night_setback_enabled:
      name: Nachtabsenkung aktivieren
      required: false
      selector:
        boolean:
    night_setback_offset:
      name: Nachtabsenkung Offset (°C)
      required: false
      selector:
        number:
          min: 0.5
          max: 6
          step: 0.5
    preheat_minutes:
      name: Vorheiz-Vorlaufzeit (min)
      required: false
      selector:
        number:
          min: 0
          max: 120
          step: 5

reload:
  name: Integration neu laden
  description: Lädt die Intelligent Heating Control Integration neu.
