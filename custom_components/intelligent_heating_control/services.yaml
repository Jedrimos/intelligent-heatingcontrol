add_room:
  name: Zimmer hinzufügen
  description: Fügt ein neues Zimmer zur Heizungssteuerung hinzu.
  fields:
    name:
      name: Zimmername
      description: Name des Zimmers (z.B. "Wohnzimmer")
      required: true
      example: "Wohnzimmer"
      selector:
        text:
    temp_sensor:
      name: Temperatursensor
      description: Entitäts-ID des Temperatursensors im Zimmer
      required: false
      example: "sensor.wohnzimmer_temperatur"
      selector:
        entity:
          domain: sensor
    valve_entity:
      name: Thermostat/Ventil
      description: Entitäts-ID des steuerbaren Thermostats oder Ventils (optional)
      required: false
      selector:
        entity:
          domain: climate
    window_sensor:
      name: Fenstersensor
      description: Binärsensor für Fenster-offen-Erkennung (optional)
      required: false
      selector:
        entity:
          domain: binary_sensor
    room_offset:
      name: Zimmer-Offset (°C)
      description: Offset zur Heizkurven-Basistemperatur für dieses Zimmer
      required: false
      default: 0.0
      selector:
        number:
          min: -5
          max: 5
          step: 0.5
          unit_of_measurement: "°C"
    comfort_temp:
      name: Komfort-Temperatur (°C)
      required: false
      default: 21.0
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
    eco_offset:
      name: Eco-Offset (°C)
      description: Abzug von der Komfort-Temperatur im Eco-Modus (z.B. 3 = 21°C - 3 = 18°C)
      required: false
      default: 3.0
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
          unit_of_measurement: "°C"
    sleep_offset:
      name: Schlaf-Offset (°C)
      description: Abzug von der Komfort-Temperatur im Schlaf-Modus (z.B. 4 = 21°C - 4 = 17°C)
      required: false
      default: 4.0
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
          unit_of_measurement: "°C"
    deadband:
      name: Totband (°C)
      description: Proportionalbereich für die Anforderungsberechnung
      required: false
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 2.0
          step: 0.1
    weight:
      name: Gewichtung
      description: Gewichtung dieses Zimmers bei der Gesamtanforderungsberechnung
      required: false
      default: 1.0
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1

remove_room:
  name: Zimmer entfernen
  description: Entfernt ein Zimmer aus der Heizungssteuerung.
  fields:
    id:
      name: Zimmer-ID
      description: Interne ID des zu entfernenden Zimmers
      required: true
      selector:
        text:

update_room:
  name: Zimmer aktualisieren
  description: Aktualisiert die Konfiguration eines bestehenden Zimmers.
  fields:
    id:
      name: Zimmer-ID
      description: Interne ID des Zimmers
      required: true
      selector:
        text:
    temp_sensor:
      name: Temperatursensor
      required: false
      selector:
        text:
    valve_entity:
      name: Thermostat/Ventil (primär)
      required: false
      selector:
        text:
    valve_entities:
      name: Thermostate/Ventile (Liste)
      required: false
      selector:
        object:
    window_sensor:
      name: Fenstersensor (primär)
      required: false
      selector:
        text:
    window_sensors:
      name: Fenstersensoren (Liste)
      required: false
      selector:
        object:
    comfort_temp:
      name: Komfort-Fallback (°C)
      required: false
      selector:
        number:
          min: 15
          max: 30
          step: 0.5
    eco_offset:
      name: Eco-Abzug (°C)
      required: false
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
    eco_max_temp:
      name: Eco-Maximum (°C)
      required: false
      selector:
        number:
          min: 10
          max: 28
          step: 0.5
    sleep_offset:
      name: Schlaf-Abzug (°C)
      required: false
      selector:
        number:
          min: 0
          max: 10
          step: 0.5
    sleep_max_temp:
      name: Schlaf-Maximum (°C)
      required: false
      selector:
        number:
          min: 10
          max: 25
          step: 0.5
    away_offset:
      name: Abwesend-Abzug (°C)
      required: false
      selector:
        number:
          min: 0
          max: 15
          step: 0.5
    away_max_temp:
      name: Abwesend-Maximum (°C)
      required: false
      selector:
        number:
          min: 5
          max: 22
          step: 0.5
    room_offset:
      name: Zimmer-Offset (°C)
      required: false
      selector:
        number:
          min: -5
          max: 5
          step: 0.5
    deadband:
      name: Totband (°C)
      required: false
      selector:
        number:
          min: 0.1
          max: 2.0
          step: 0.1
    weight:
      name: Gewichtung
      required: false
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
    ha_schedule_off_mode:
      name: Zeitplan-Aus-Modus
      required: false
      selector:
        text:
    schedules:
      name: IHC-Zeitpläne
      required: false
      selector:
        object:
    ha_schedules:
      name: HA-Zeitpläne
      required: false
      selector:
        object:
    humidity_sensor:
      name: Feuchtigkeitssensor
      required: false
      selector:
        text:
    mold_protection_enabled:
      name: Schimmelschutz aktiviert
      required: false
      selector:
        boolean:
    co2_sensor:
      name: CO₂-Sensor
      required: false
      selector:
        text:
    radiator_kw:
      name: Heizleistung Zimmer (kW)
      required: false
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
    hkv_sensor:
      name: HKV-Sensor
      required: false
      selector:
        text:
    hkv_factor:
      name: HKV-Faktor (kWh/Einheit)
      required: false
      selector:
        number:
          min: 0.001
          max: 1.0
          step: 0.001
    room_presence_entities:
      name: Anwesenheits-Entitäten
      required: false
      selector:
        object:
    away_temp_room:
      name: Abwesend-Temperatur Zimmer (°C)
      description: Feste Temperatur im Zimmer-Abwesend-Modus
      required: false
      selector:
        number:
          min: 10
          max: 22
          step: 0.5
    boost_default_duration:
      name: Boost-Dauer (min)
      required: false
      selector:
        number:
          min: 5
          max: 480
          step: 5
    trv_calibrations:
      name: TRV-Kalibrierungen (pro Gerät)
      description: "Dict mit entity_id → Offset °C, z.B. {\"climate.trv_schrank\": -2.0}"
      required: false
      selector:
        object:
    trv_temp_weight:
      name: TRV-Temperaturgewichtung (0–1)
      description: Anteil der TRV-Temperaturen im Blending (0 = nur Raumsensor)
      required: false
      selector:
        number:
          min: 0
          max: 1
          step: 0.1
    trv_temp_offset:
      name: TRV-Temperaturoffset (°C)
      description: Kalibrierungsoffset für TRV-Temperaturen
      required: false
      selector:
        number:
          min: -5
          max: 5
          step: 0.5
    trv_valve_demand:
      name: TRV-Ventilposition als Anforderung
      required: false
      selector:
        boolean:
    trv_min_send_interval:
      name: TRV Min. Sendeinterval (s)
      required: false
      selector:
        number:
          min: 0
          max: 600
          step: 10
    window_reaction_time:
      name: Fenster-Reaktionszeit (s)
      required: false
      selector:
        number:
          min: 0
          max: 300
          step: 10
    window_close_delay:
      name: Fenster-Schließverzögerung (s)
      required: false
      selector:
        number:
          min: 0
          max: 600
          step: 30
    window_open_temp:
      name: Temperatur bei offenem Fenster (°C)
      description: "Zieltemperatur wenn Fenster offen (0 = Frostschutztemperatur)"
      required: false
      selector:
        number:
          min: 0
          max: 18
          step: 0.5
    window_restore_mode:
      name: Sollwert nach Fenster schließen
      description: "schedule = Zeitplan neu berechnen, previous = letzten Wert vor Öffnung wiederherstellen"
      required: false
      selector:
        select:
          options:
            - "schedule"
            - "previous"
    room_temp_threshold:
      name: Heiz-Temperaturschwelle (°C)
      description: "Mindesttemperatur ab der geheizt wird (0 = deaktiviert)"
      required: false
      selector:
        number:
          min: 0
          max: 25
          step: 0.5
    comfort_temp_entity:
      name: Komfort-Temp-Entität
      description: input_number.* Entität für dynamischen Komfort-Sollwert
      required: false
      selector:
        text:
    eco_temp_entity:
      name: Eco-Temp-Entität
      description: input_number.* Entität für dynamischen Eco-Sollwert
      required: false
      selector:
        text:
    comfort_extend_entity:
      name: Komfort-Verlängerung Entität
      description: binary_sensor.* oder input_boolean.* Entität die Komfortmodus verlängert
      required: false
      selector:
        text:
    comfort_extend_state:
      name: Komfort-Verlängerung Zustand
      description: "Zustand der Entität der Verlängerung auslöst (Standard: on)"
      required: false
      selector:
        text:
    boost_temp:
      name: Boost-Temperatur (°C)
      description: Zieltemperatur im Boost-Modus
      required: false
      selector:
        number:
          min: 18
          max: 30
          step: 0.5
    aggressive_mode_enabled:
      name: Aggressiver Modus aktiviert
      required: false
      selector:
        boolean:
    aggressive_mode_range:
      name: Aggressiver Modus Bereich (°C)
      required: false
      selector:
        number:
          min: 0.5
          max: 5
          step: 0.5
    aggressive_mode_offset:
      name: Aggressiver Modus Offset (°C)
      required: false
      selector:
        number:
          min: 0.5
          max: 5
          step: 0.5

set_room_mode:
  name: Zimmermodus setzen
  description: Setzt den Betriebsmodus für ein Zimmer.
  fields:
    id:
      name: Zimmer-ID
      required: true
      selector:
        text:
    mode:
      name: Modus
      description: "auto, comfort, eco, sleep, away, off, manual"
      required: true
      selector:
        select:
          options:
            - "auto"
            - "comfort"
            - "eco"
            - "sleep"
            - "away"
            - "off"
            - "manual"

set_system_mode:
  name: Systemmodus setzen
  description: Setzt den globalen Betriebsmodus der Heizungssteuerung.
  fields:
    mode:
      name: Modus
      description: "auto, heat, cool, off, away, vacation, guest"
      required: true
      selector:
        select:
          options:
            - "auto"
            - "heat"
            - "cool"
            - "off"
            - "away"
            - "vacation"
            - "guest"

boost_room:
  name: Zimmer boosten
  description: Aktiviert den Boost-Modus für ein Zimmer für eine bestimmte Dauer.
  fields:
    id:
      name: Zimmer-ID
      description: Interne ID des Zimmers
      required: true
      selector:
        text:
    duration_minutes:
      name: Dauer (Minuten)
      description: Wie lange der Boost aktiv sein soll
      required: false
      default: 60
      selector:
        number:
          min: 5
          max: 480
          step: 5
    cancel:
      name: Abbrechen
      description: Wenn true, wird der aktive Boost abgebrochen
      required: false
      default: false
      selector:
        boolean:

update_global_settings:
  name: Globale Einstellungen aktualisieren
  description: Aktualisiert globale Einstellungen der Heizungssteuerung ohne Neustart.
  fields:
    demand_threshold:
      name: Einschaltschwelle (%)
      required: false
      selector:
        number:
          min: 1
          max: 100
          step: 1
    demand_hysteresis:
      name: Hysterese (%)
      required: false
      selector:
        number:
          min: 1
          max: 30
          step: 1
    min_on_time:
      name: Min. Einschaltzeit (min)
      required: false
      selector:
        number:
          min: 1
          max: 60
          step: 1
    min_off_time:
      name: Min. Ausschaltzeit (min)
      required: false
      selector:
        number:
          min: 1
          max: 60
          step: 1
    min_rooms_demand:
      name: Min. Zimmer mit Anforderung
      required: false
      selector:
        number:
          min: 1
          max: 20
          step: 1
    away_temp:
      name: Abwesend-Temperatur (°C)
      required: false
      selector:
        number:
          min: 5
          max: 25
          step: 0.5
    vacation_temp:
      name: Urlaubs-Temperatur (°C)
      required: false
      selector:
        number:
          min: 5
          max: 20
          step: 0.5
    frost_protection_temp:
      name: Frostschutz-Temperatur (°C)
      required: false
      selector:
        number:
          min: 4
          max: 15
          step: 0.5
    summer_mode_enabled:
      name: Sommerautomatik aktivieren
      required: false
      selector:
        boolean:
    summer_threshold:
      name: Sommer-Schwelle (°C)
      required: false
      selector:
        number:
          min: 10
          max: 30
          step: 0.5
    summer_mode_entity:
      name: Sommermodus-Entity (externer Schalter)
      required: false
      selector:
        entity:
          domain:
            - input_boolean
            - binary_sensor
    forecast_coldnight_enabled:
      name: Kälteprognose-Frühstart aktivieren
      required: false
      selector:
        boolean:
    forecast_coldnight_temp:
      name: Kälteschwelle Nacht (°C)
      required: false
      selector:
        number:
          min: -10
          max: 20
          step: 0.5
    forecast_advance_hours:
      name: Frühstart-Vorlaufzeit (Stunden)
      required: false
      selector:
        number:
          min: 1
          max: 8
          step: 1
    night_setback_enabled:
      name: Nachtabsenkung aktivieren
      required: false
      selector:
        boolean:
    night_setback_offset:
      name: Nachtabsenkung Offset (°C)
      required: false
      selector:
        number:
          min: 0.5
          max: 6
          step: 0.5
    preheat_minutes:
      name: Vorheiz-Vorlaufzeit (min)
      required: false
      selector:
        number:
          min: 0
          max: 120
          step: 5
    stuck_valve_timeout:
      name: Stuck-Valve Timeout (s)
      description: Sekunden bis ein Ventil als feststehend gilt
      required: false
      selector:
        number:
          min: 300
          max: 7200
          step: 300
    limescale_protection_enabled:
      name: Kalkschutz aktiviert
      required: false
      selector:
        boolean:
    limescale_interval_days:
      name: Kalkschutz-Intervall (Tage)
      required: false
      selector:
        number:
          min: 7
          max: 90
          step: 1
    limescale_time:
      name: Kalkschutz-Uhrzeit (HH:MM)
      required: false
      selector:
        text:
    limescale_duration_minutes:
      name: Kalkschutz-Dauer (min)
      required: false
      selector:
        number:
          min: 1
          max: 30
          step: 1
    presence_entities:
      name: Anwesenheits-Entitäten
      description: Liste der Personen-/Geräte-Entitäten für globale Anwesenheitserkennung
      required: false
      selector:
        object:
    presence_away_delay_minutes:
      name: Abwesend-Verzögerung (min)
      description: Minuten nach denen Auto-Away ausgelöst wird
      required: false
      selector:
        number:
          min: 0
          max: 120
          step: 5
    presence_arrive_delay_minutes:
      name: Ankunfts-Verzögerung (min)
      description: Minuten Vorlauf vor Ankunft für Vorheizung
      required: false
      selector:
        number:
          min: 0
          max: 60
          step: 5
    eta_preheat_enabled:
      name: ETA-Vorheizen aktiviert
      required: false
      selector:
        boolean:
    eta_preheat_threshold_minutes:
      name: ETA-Vorheizen Schwelle (min)
      description: Minuten vor Ankunft ab wann vorgeheizt wird
      required: false
      selector:
        number:
          min: 10
          max: 240
          step: 5
    heating_period_entity:
      name: Heizperiode-Entität
      description: input_boolean.* oder binary_sensor.* für aktive Heizperiode
      required: false
      selector:
        text:
    outdoor_temp_smoothing_minutes:
      name: Außentemp. Glättung (min)
      description: Gleitender Durchschnitt der Außentemperatur in Minuten
      required: false
      selector:
        number:
          min: 0
          max: 120
          step: 5
    startup_grace_seconds:
      name: Startup-Gnadenfrist (s)
      description: Sekunden nach Start bevor Sensoren als ungültig gelten
      required: false
      selector:
        number:
          min: 0
          max: 300
          step: 10

reload:
  name: Integration neu laden
  description: Lädt die Intelligent Heating Control Integration neu.

export_config:
  name: Konfiguration exportieren
  description: Exportiert die aktuelle IHC-Konfiguration als JSON in eine persistente Benachrichtigung.

activate_guest_mode:
  name: Gäste-Modus aktivieren
  description: Aktiviert den Gäste-Modus für eine bestimmte Dauer.
  fields:
    duration_hours:
      name: Dauer (Stunden)
      description: Wie lange der Gäste-Modus aktiv sein soll (Standard aus Konfiguration)
      required: false
      default: 24
      selector:
        number:
          min: 1
          max: 168
          step: 1
          unit_of_measurement: "h"

deactivate_guest_mode:
  name: Gäste-Modus deaktivieren
  description: Deaktiviert den Gäste-Modus und kehrt zum vorherigen Systemzustand zurück.

reset_stats:
  name: Statistik zurücksetzen
  description: Setzt alle Laufzeit- und Energiestatistiken auf Null zurück.
  fields:
    reset_curve:
      name: Heizkurvenadaption zurücksetzen
      description: Wenn true, wird auch die adaptive Heizkurvenkorrektur auf 0 zurückgesetzt
      required: false
      default: false
      selector:
        boolean:

# ── v1.7 Heizgruppen ──────────────────────────────────────────────────────────

add_group:
  name: Gruppe hinzufügen
  description: Erstellt eine neue Heizgruppe mit den angegebenen Zimmern.
  fields:
    group_name:
      name: Gruppenname
      description: Anzeigename der Gruppe
      required: true
      selector:
        text:
    group_rooms:
      name: Zimmer-IDs
      description: Liste der room_ids die zur Gruppe gehören
      required: false
      default: []
      selector:
        object:

remove_group:
  name: Gruppe entfernen
  description: Entfernt eine Heizgruppe (Zimmer werden nicht gelöscht).
  fields:
    group_id:
      name: Gruppen-ID
      description: Interne ID der zu entfernenden Gruppe
      required: true
      selector:
        text:

update_group:
  name: Gruppe aktualisieren
  description: Ändert Name oder Zimmer-Zuordnung einer Heizgruppe.
  fields:
    group_id:
      name: Gruppen-ID
      description: Interne ID der Gruppe
      required: true
      selector:
        text:
    group_name:
      name: Gruppenname
      description: Neuer Anzeigename (optional)
      required: false
      selector:
        text:
    group_rooms:
      name: Zimmer-IDs
      description: Neue Liste der room_ids (optional)
      required: false
      selector:
        object:

set_group_mode:
  name: Gruppen-Modus setzen
  description: Setzt den Betriebsmodus für alle Zimmer einer Gruppe gleichzeitig.
  fields:
    group_id:
      name: Gruppen-ID
      description: Interne ID der Gruppe
      required: true
      selector:
        text:
    mode:
      name: Modus
      description: Zimmer-Betriebsmodus für alle Räume der Gruppe
      required: true
      default: auto
      selector:
        select:
          options:
            - auto
            - comfort
            - eco
            - sleep
            - away
            - "off"
